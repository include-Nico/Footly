<div class="squad-view glass-panel" style="min-height: 550px; padding: 15px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <div class="section-label" style="margin: 0;">Formazione</div>
        <select id="formation-select" class="glass-select" style="width: auto; padding: 6px 12px; margin: 0; min-width: 150px;">
            <option value="2-3-1">2-3-1 (Equilibrato)</option>
            <option value="3-2-1">3-2-1 (Difensivo)</option>
            <option value="2-2-2">2-2-2 (Offensivo)</option>
            <option value="1-4-1">1-4-1 (Possesso)</option>
        </select>
    </div>
    
    <div style="display: flex; justify-content: space-around; font-size: 12px; font-weight: bold; margin-bottom: 15px; background: var(--bg-surface); padding: 8px; border-radius: 8px; border: 1px solid var(--border-dim);">
        <span id="tactics-att" style="color: var(--accent);">ATT: +0%</span>
        <span id="tactics-def" style="color: var(--notif-info);">DIF: +0%</span>
    </div>

    <div class="pitch-container" id="pitch-container" style="height: 420px; width: 100%;">
        <div class="pitch-line-center"></div>
        <div class="pitch-circle"></div>
        <div class="pitch-box-top"></div>
        <div class="pitch-box-bottom"></div>
        <div id="pitch-players" style="position: absolute; inset: 0; width: 100%; height: 100%;"></div>
    </div>

    <div class="divider" style="margin: 20px 0;"></div>
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div class="section-label" style="margin: 0;">Panchina</div>
        <div style="display: flex; gap: 8px;">
            <button id="btn-info" class="glass-btn" style="padding: 6px 10px; font-size: 11px; display: none;"><i class="fas fa-info-circle"></i> Info</button>
            <button id="btn-svincola-mode" class="glass-btn" style="padding: 6px 10px; font-size: 11px; border-color: var(--text-hint); color: var(--text-muted);"><i class="fas fa-trash-can"></i> Svincola</button>
        </div>
    </div>
    
    <div id="bench-players" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-bottom: 20px;">
        </div>
    
    <button id="btn-confirm-svincolo" class="glass-btn" style="width: 100%; padding: 12px; background: rgba(240, 82, 82, 0.1); color: var(--notif-error); border-color: var(--notif-error); font-weight: bold; display: none;">
        Conferma Svincolo (0)
    </button>
</div>
