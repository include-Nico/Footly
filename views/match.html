<div class="match-view" style="height: 100%; display: flex; flex-direction: column; background: var(--bg-deep); position: absolute; inset: 0; z-index: 50;">
    
    <div id="match-intro" style="position: absolute; inset: 0; background: var(--bg-surface); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center;">
        <h2 style="color: var(--accent); margin-bottom: 5px;" id="intro-match-type">Giornata X</h2>
        <p id="intro-stadium" style="color: var(--text-hint); font-size: 12px; margin-bottom: 5px;">Stadio di Casa</p>
        <p id="intro-aggregate" style="color: var(--gold); font-size: 11px; margin-bottom: 25px; font-weight: bold;"></p>
        
        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; width: 100%; margin-bottom: 40px;">
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                <div id="intro-home-icon" style="font-size: 40px; margin-bottom: 8px;">⚽</div>
                <h3 id="intro-home-name" style="margin: 0 0 5px 0;">Tu</h3>
                <div id="intro-home-str" style="display: flex; flex-direction: column; align-items: center; color: var(--gold); font-weight: bold; font-size: 16px;"></div>
            </div>
            
            <div style="font-size: 24px; font-weight: bold; color: var(--text-muted);">VS</div>
            
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center;">
                <div id="intro-away-icon" style="font-size: 40px; margin-bottom: 8px;">🤖</div>
                <h3 id="intro-away-name" style="margin: 0 0 5px 0;">CPU</h3>
                <div id="intro-away-str" style="display: flex; flex-direction: column; align-items: center; color: var(--gold); font-weight: bold; font-size: 16px;"></div>
            </div>
        </div>
        
        <div style="display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 260px;">
            <button id="start-kickoff-btn" class="primary-btn" style="margin-top: 0;">Fischio d'Inizio <i class="fas fa-whistle"></i></button>
            <button id="btn-intro-sim" class="glass-btn" style="border-color: #00d4ff; color: #00d4ff; padding: 14px;">Simula Rapida (💎 5) <i class="fas fa-bolt"></i></button>
            <button id="btn-intro-squad" class="glass-btn" style="padding: 14px;">Gestione Squadra <i class="fas fa-users"></i></button>
            <button id="btn-intro-home" class="glass-btn" style="padding: 14px;">Torna alla Home <i class="fas fa-arrow-left"></i></button>
        </div>
    </div>

    <div id="match-engine" style="display: none; flex-direction: column; height: 100%; position: relative;">
        <div style="background: var(--bg-card); padding: 15px 20px; border-bottom: 1px solid var(--border-dim); display: flex; justify-content: space-between; align-items: center;">
            <div style="text-align: center; flex: 1;">
                <div id="score-home-name" style="font-size: 12px; color: var(--text-hint); text-transform: uppercase;">HOME</div>
                <div id="score-home" style="font-family: 'Barlow Condensed'; font-size: 36px; font-weight: bold; color: var(--accent);">0</div>
            </div>
            <div style="text-align: center; flex: 1;">
                <div id="match-time" style="font-family: 'Barlow Condensed'; font-size: 24px; font-weight: bold; color: var(--text-primary);">00'</div>
                <div class="progress-bar-bg" style="width: 100px; height: 6px; background: var(--bg-surface); border-radius: 3px; margin: 4px auto 0; overflow: hidden;">
                    <div id="match-progress" style="height: 100%; width: 0%; background: var(--accent); transition: width 0.2s linear;"></div>
                </div>
            </div>
            <div style="text-align: center; flex: 1;">
                <div id="score-away-name" style="font-size: 12px; color: var(--text-hint); text-transform: uppercase;">AWAY</div>
                <div id="score-away" style="font-family: 'Barlow Condensed'; font-size: 36px; font-weight: bold; color: var(--notif-error);">0</div>
            </div>
        </div>

        <div id="match-log" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: var(--bg-deep);">
            <div style="text-align: center; color: var(--text-muted); font-size: 11px;">La partita è iniziata!</div>
        </div>

        <div style="padding: 15px; background: var(--bg-card); border-top: 1px solid var(--border-dim); display: flex; gap: 10px;">
            <button id="btn-pause-sub" class="glass-btn" style="flex: 2; border-color: var(--accent); color: var(--accent);"><i class="fas fa-pause"></i> Gestione (<span id="subs-left">5</span>)</button>
            <button id="btn-match-speed" class="glass-btn" style="flex: 1; border-color: var(--notif-info); color: var(--notif-info);"><i class="fas fa-forward"></i> 1x</button>
        </div>

        <div id="match-banner" class="match-banner-overlay">
            <div id="match-banner-text" class="match-banner-text">EVENTO!</div>
            <div id="match-banner-details" class="match-banner-details"></div>
        </div>
    </div>

    <div id="event-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 id="event-title" style="color: var(--accent); text-align: center; margin-bottom: 10px;">Evento</h3>
            <p id="event-desc" style="font-size: 14px; color: var(--text-primary); text-align: center; margin-bottom: 20px; line-height: 1.4;"></p>
            <div id="event-options" style="display: flex; flex-direction: column; gap: 10px;"></div>
        </div>
    </div>

    <div id="goal-modal" class="modal-overlay" style="background: rgba(0,0,0,0.95);">
        <div class="modal-box" style="background: transparent; border: none; box-shadow: none;">
            <h2 id="goal-modal-title" style="color: white; text-align: center; margin-bottom: 5px; text-shadow: 0 2px 4px black;">OCCASIONE GOL!</h2>
            <p id="shooter-name" style="color: var(--gold); text-align: center; margin-bottom: 20px; font-weight: bold;"></p>
            <div class="goal-grid">
                <div class="goal-section" data-zone="0"></div><div class="goal-section" data-zone="1"></div><div class="goal-section" data-zone="2"></div>
                <div class="goal-section" data-zone="3"></div><div class="goal-section" data-zone="4"></div><div class="goal-section" data-zone="5"></div>
            </div>
            <p id="goal-helper-text" style="color: white; text-align: center; margin-top: 15px; font-size: 12px;">Scegli dove tirare!</p>
        </div>
    </div>

    <div id="pk-modal" class="modal-overlay" style="background: rgba(0,0,0,0.98); z-index: 300;">
        <div class="modal-box" style="background: transparent; border: none; box-shadow: none; width: 100%; max-width: 500px; padding: 10px;">
            <h2 style="color: var(--gold); text-align: center; margin-bottom: 20px; font-size: 28px; text-shadow: 0 0 10px var(--gold);">CALCI DI RIGORE</h2>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px;">
                <div style="text-align: center; flex: 1;">
                    <div id="pk-home-name" style="color: var(--accent); font-weight: bold; font-size: 16px; margin-bottom: 8px;">HOME</div>
                    <div id="pk-home-dots" style="display: flex; justify-content: center; gap: 5px;"></div>
                </div>
                <div id="pk-score" style="font-size: 36px; font-weight: bold; color: white; padding: 0 20px; font-family: 'Barlow Condensed';">0 - 0</div>
                <div style="text-align: center; flex: 1;">
                    <div id="pk-away-name" style="color: var(--notif-error); font-weight: bold; font-size: 16px; margin-bottom: 8px;">AWAY</div>
                    <div id="pk-away-dots" style="display: flex; justify-content: center; gap: 5px;"></div>
                </div>
            </div>

            <div id="pk-status-text" style="color: white; text-align: center; margin-bottom: 20px; font-size: 18px; font-weight: bold;">Tocca a te! Scegli dove tirare.</div>
            
            <div class="goal-grid" id="pk-grid">
                <div class="goal-section" data-zone="0"></div><div class="goal-section" data-zone="1"></div><div class="goal-section" data-zone="2"></div>
                <div class="goal-section" data-zone="3"></div><div class="goal-section" data-zone="4"></div><div class="goal-section" data-zone="5"></div>
            </div>
            
            <div id="pk-result-overlay" style="display:none; position:absolute; inset:0; background:rgba(0,0,0,0.8); z-index:10; justify-content:center; align-items:center; flex-direction:column;">
                <h1 id="pk-result-title" style="font-size:40px; margin-bottom:20px;">VITTORIA!</h1>
                <button id="pk-finish-btn" class="primary-btn">Continua</button>
            </div>
        </div>
    </div>

    <div id="subs-modal" class="modal-overlay">
        <div class="modal-box" style="width: 100%; max-width: 480px; height: 95vh; padding: 15px; display: flex; flex-direction: column; background: var(--bg-deep); border: none; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <select id="match-formation-select" class="glass-select" style="width: auto; padding: 6px 10px; margin: 0; font-size: 11px;">
                    <option value="2-3-1">2-3-1</option> <option value="3-2-1">3-2-1</option> <option value="2-2-2">2-2-2</option> <option value="1-4-1">1-4-1</option>
                </select>
                <h3 style="color: white; margin: 0; font-size: 12px;">Cambi: <span id="subs-modal-left" style="color: var(--accent);">5</span></h3>
                <button id="close-subs-btn" class="glass-btn" style="color: var(--accent); border-color: var(--accent); padding: 6px 10px; font-size: 11px;"><i class="fas fa-play"></i> Riprendi</button>
            </div>
            <div class="pitch-container" id="match-pitch-container" style="height: 380px; width: 100%; flex-shrink: 0; margin-bottom: 15px;">
                <div class="pitch-line-center"></div><div class="pitch-circle"></div><div class="pitch-box-top"></div><div class="pitch-box-bottom"></div>
                <div id="match-pitch-players" style="position: absolute; inset: 0; width: 100%; height: 100%;"></div>
            </div>
            <div class="section-label" style="text-align: center; margin-bottom: 10px;">Panchina (Trascina per sostituire)</div>
            <div id="match-bench-players" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding-bottom: 20px;"></div>
        </div>
    </div>
</div>
