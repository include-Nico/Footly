<div class="home-view glass-panel" style="min-height: 550px; padding: 15px;">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div style="display: flex; align-items: center; gap: 12px;">
            <div id="home-crest" style="width: 36px; height: 42px; border-radius: 8px 8px 50% 50%; border: 2px solid rgba(255,255,255,0.8); box-shadow: 0 2px 6px rgba(0,0,0,0.5);"></div>
            <div>
                <h3 id="home-team-name" style="color: var(--accent); margin: 0; font-size: 20px;">Team Name</h3>
                <div style="font-size: 12px; color: var(--text-hint);">Div <span id="home-div-num"></span> · Settimana <span id="matchday-counter"></span>/46</div>
            </div>
        </div>
        <div id="home-team-rating" style="display: flex; flex-direction: column; align-items: flex-end;"></div>
    </div>

    <div class="match-card glass-panel" style="padding: 15px; margin-bottom: 20px; border-color: var(--accent);">
        <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; text-align: center;">Prossima Partita</div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; width: 100%;">
            
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center;">
                <h3 id="next-home-name" style="margin: 0 0 5px 0; font-size: 16px;">Tu</h3>
                <div id="next-home-rating" style="display: flex; flex-direction: column; align-items: center; gap: 2px;"></div>
            </div>
            
            <div id="match-vs-badge" style="font-size: 16px; font-weight: bold; color: var(--text-muted); padding: 0 10px;">VS</div>
            
            <div style="flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center;">
                <h3 id="cpu-team-name" style="margin: 0 0 5px 0; font-size: 16px;">CPU</h3>
                <div id="cpu-team-rating" style="display: flex; flex-direction: column; align-items: center; gap: 2px;"></div>
            </div>
            
        </div>
        
        <button id="play-match-btn" class="glass-btn" style="width: 100%; border-color: var(--accent); color: var(--accent); justify-content: center;">
            <span id="play-btn-text">Gioca Partita</span> <span id="play-btn-icon" style="margin-left: 5px;"><i class="fas fa-play"></i></span>
        </button>
    </div>

    <div class="section-label">Calendario Stagione</div>
    <div id="schedule-container" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 20px; scroll-snap-type: x mandatory;"></div>

    <div class="section-label">Classifica</div>
    <div class="table-responsive">
        <table class="league-table" style="width: 100%; text-align: left; border-collapse: collapse; font-size: 12px;">
            <thead>
                <tr style="color: var(--text-hint); border-bottom: 1px solid var(--border-dim);">
                    <th style="padding: 8px 4px; width: 30px;">#</th>
                    <th style="padding: 8px 4px;">Squadra</th>
                    <th style="padding: 8px 4px; text-align: center;">Forza</th>
                    <th style="padding: 8px 4px; text-align: center;">PT</th>
                    <th style="padding: 8px 4px; text-align: center;">G</th>
                </tr>
            </thead>
            <tbody id="league-table-body"></tbody>
        </table>
    </div>
</div>
