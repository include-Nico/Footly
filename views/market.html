<div class="glass-panel" style="padding: 20px; min-height: 500px; display: flex; flex-direction: column;">
    
    <div style="display: flex; gap: 10px; margin-bottom: 20px;">
        <button id="tab-market-search" class="glass-btn" style="flex: 1; border-color: var(--accent); color: var(--accent);">Ricerca Talent</button>
        <button id="tab-market-transfer" class="glass-btn" style="flex: 1; position: relative;">
            Le Mie Cessioni
            <div id="transfer-notif-badge" style="display: none; position: absolute; top: -5px; right: -5px; background: var(--notif-error); color: white; width: 16px; height: 16px; border-radius: 50%; font-size: 10px; font-weight: bold; line-height: 16px; text-align: center; box-shadow: 0 0 8px var(--notif-error);">!</div>
        </button>
    </div>

    <div id="market-search-view" style="display: flex; flex-direction: column; flex: 1;">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <input type="text" id="market-search-name" class="glass-select" placeholder="Nome giocatore..." style="grid-column: span 2;">
            
            <select id="market-pos" class="glass-select">
                <option value="">Qualsiasi Ruolo</option>
                <option value="POR">Portieri (POR)</option>
                <option value="DIF">Difensori (DIF)</option>
                <option value="CEN">Centrocampisti (CEN)</option>
                <option value="ATT">Attaccanti (ATT)</option>
            </select>
            <select id="market-age" class="glass-select">
                <option value="">Qualsiasi Età</option>
                <option value="15-21">Giovani (15-21)</option>
                <option value="22-26">Nel Picco (22-26)</option>
                <option value="27-29">Esperti (27-29)</option>
                <option value="30-45">Veterani (30+)</option>
            </select>
            <select id="market-rarity" class="glass-select" style="grid-column: span 2;">
                <option value="">Qualsiasi Qualità</option>
                <option value="Bronzo">Bronzo</option>
                <option value="Argento">Argento</option>
                <option value="Oro">Oro</option>
                <option value="Oro Raro">Oro Raro</option>
                <option value="Super Raro">Super Raro</option>
                <option value="Epico">Epico</option>
                <option value="Leggenda">Leggenda</option>
            </select>

            <div style="grid-column: span 2; display: flex; flex-direction: column; gap: 5px; margin-top: 5px;">
                <div style="display: flex; justify-content: space-between; font-size: 11px; color: var(--text-hint); text-transform: uppercase;">
                    <span>Min: <b id="price-min-val" style="color:var(--gold);">0</b></span>
                    <span>Max: <b id="price-max-val" style="color:var(--gold);">1.000.000</b></span>
                </div>
                
                <style>
                    .dual-slider-container { position: relative; height: 30px; display: flex; align-items: center; margin: 0 5px; }
                    .dual-slider-track { position: absolute; width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; }
                    .dual-slider-fill { position: absolute; height: 6px; background: var(--gold); border-radius: 3px; z-index: 1; }
                    .dual-slider-input { position: absolute; width: 100%; -webkit-appearance: none; appearance: none; background: transparent; pointer-events: none; z-index: 2; outline: none; margin: 0; }
                    .dual-slider-input::-webkit-slider-thumb { pointer-events: auto; -webkit-appearance: none; width: 18px; height: 18px; background: var(--gold); border-radius: 50%; cursor: pointer; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
                    .dual-slider-input::-moz-range-thumb { pointer-events: auto; width: 18px; height: 18px; background: var(--gold); border-radius: 50%; cursor: pointer; border: none; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
                </style>
                
                <div class="dual-slider-container">
                    <div class="dual-slider-track"></div>
                    <div id="price-track-fill" class="dual-slider-fill" style="left: 0%; width: 100%;"></div>
                    <input type="range" id="market-price-min" class="dual-slider-input" min="0" max="1000000" step="5000" value="0">
                    <input type="range" id="market-price-max" class="dual-slider-input" min="0" max="1000000" step="5000" value="1000000">
                </div>
            </div>
        </div>

        <button id="market-search-btn" class="primary-btn" style="margin-bottom: 20px;"><i class="fas fa-search"></i> Cerca</button>
        <div id="market-results" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding-bottom: 20px;">
            <div style="color: var(--text-hint); text-align: center; width: 100%; margin-top: 20px; font-size: 12px;">Imposta i filtri e avvia la ricerca.</div>
        </div>
    </div>

    <div id="market-transfer-view" style="display: none; flex-direction: column; flex: 1;">
        <div style="text-align: center; margin-bottom: 15px;">
            <i class="fas fa-handshake" style="font-size: 24px; color: var(--gold); margin-bottom: 5px;"></i>
            <h3 style="color: var(--gold); margin: 0;">Lista Trasferimenti</h3>
            <p style="font-size: 11px; color: var(--text-hint);">I giocatori in lista riceveranno offerte con l'avanzare delle giornate.</p>
        </div>
        
        <div id="transfer-list-container" style="display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px;">
            </div>
    </div>

</div>
