<div class="squad-view glass-panel" style="padding: 20px;">
    
    <div style="text-align: center; margin-bottom: 24px;">
        <div class="team-crest" style="margin: 0 auto 12px; width: 70px; height: 70px; font-size: 32px;">⚽</div>
        <h2 id="profile-team-name" style="font-size: 28px; color: var(--text-primary);">Nome Squadra</h2>
        <p id="profile-league-div" style="color: var(--text-hint); font-weight: 600; text-transform: uppercase; font-size: 12px; letter-spacing: 0.05em;">Campionato · Div 3</p>
    </div>

    <div class="section-label">Statistiche Club</div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;">
        <div style="background: var(--bg-surface); border: 1px solid var(--border-dim); border-radius: var(--radius-sm); padding: 16px; text-align: center;">
            <div id="profile-coins" style="font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; color: var(--gold);">0</div>
            <div style="font-size: 10px; color: var(--text-hint); letter-spacing: .06em; text-transform: uppercase; margin-top: 4px;">Monete Attuali</div>
        </div>
        <div style="background: var(--bg-surface); border: 1px solid var(--border-dim); border-radius: var(--radius-sm); padding: 16px; text-align: center;">
            <div id="profile-players-count" style="font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; color: var(--accent);">0</div>
            <div style="font-size: 10px; color: var(--text-hint); letter-spacing: .06em; text-transform: uppercase; margin-top: 4px;">Giocatori in Rosa</div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="section-label" style="color: var(--notif-error);">Zona Pericolosa</div>
    <p style="font-size: 13px; color: var(--text-hint); margin-bottom: 16px; line-height: 1.4;">
        Attenzione: cancellando l'account perderai irreversibilmente tutti i tuoi progressi, le carte giocatore e le monete accumulate. L'azione non può essere annullata.
    </p>
    
    <button id="delete-account-btn" class="glass-btn" style="width: 100%; border: 1px solid var(--notif-error); color: var(--notif-error); background: rgba(240, 82, 82, 0.05); padding: 14px; display: flex; align-items: center; justify-content: center; gap: 10px;">
        <i class="fas fa-trash-can"></i> Cancella Account e Ricomincia
    </button>

</div>
