<div class="home-view glass-panel" style="padding: 15px;">

    <div class="section-label">Stagione · Giornata <span id="matchday-counter">1</span> di 26</div>

    <div class="match-card">
        <div class="match-teams">
            <div class="team-block">
                <div class="team-crest" id="user-crest">⚽</div>
                <div class="team-name-label" id="home-team-name" style="margin-top:4px;">La tua squadra</div>
                <div id="home-team-rating" style="display:flex; flex-direction:column; align-items:center; margin-top:2px;"></div>
            </div>
            <div class="vs-badge" id="match-vs-badge">VS</div>
            <div class="team-block">
                <div class="team-crest">🤖</div>
                <div class="team-name-label" id="cpu-team-name" style="margin-top:4px;">Avversario</div>
                <div id="cpu-team-rating" style="display:flex; flex-direction:column; align-items:center; margin-top:2px;"></div>
            </div>
        </div>

        <div class="divider"></div>

        <div style="display:flex;gap:8px;font-size:11px;color:var(--text-hint);">
            <span><i class="fas fa-location-dot" style="margin-right:4px;color:var(--accent);"></i>Stadio di Casa</span>
        </div>
    </div>

    <button class="play-btn" id="play-match-btn" style="width: 100%; margin-top: 16px;">
        <div class="play-icon" id="play-btn-icon"><i class="fas fa-play"></i></div> 
        <span id="play-btn-text">Gioca Partita</span>
    </button>

    <div class="divider" style="margin-top:20px;"></div>

    <div class="section-label" style="margin-bottom:12px; display: flex; justify-content: space-between;">
        <span>Classifica · Div <span id="home-div-num">3</span></span>
    </div>

    <div style="background: var(--bg-surface); border: 1px solid var(--border-dim); border-radius: var(--radius-sm); padding: 10px; overflow-x: auto;">
        <table style="width: 100%; border-collapse: collapse; font-size: 11px; text-align: left; color: var(--text-primary);">
            <thead>
                <tr style="color: var(--text-hint); border-bottom: 1px solid var(--border-dim);">
                    <th style="padding: 6px 4px; width: 5%;">#</th>
                    <th style="padding: 6px 4px; width: 45%;">Squadra</th>
                    <th style="padding: 6px 4px; text-align: center; width: 25%;">Forza</th>
                    <th style="padding: 6px 4px; text-align: center;">PT</th>
                    <th style="padding: 6px 4px; text-align: center;">G</th>
                </tr>
            </thead>
            <tbody id="league-table-body">
            </tbody>
        </table>
    </div>
</div>
