<div class="market-view glass-panel" style="padding: 20px;">
    
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-satellite-dish" style="font-size: 32px; color: var(--accent); margin-bottom: 10px;"></i>
        <h3>Rete Scouting</h3>
        <p style="font-size: 12px; color: var(--text-hint);">Cerca talenti nelle rose delle squadre avversarie.</p>
    </div>

    <div style="background: var(--bg-surface); padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--border-dim); margin-bottom: 20px;">
        <input type="text" id="market-search-name" placeholder="Cerca nome..." style="margin-bottom: 10px;">
        
        <div style="display: flex; gap: 10px;">
            <select id="market-pos" class="glass-select" style="margin-top: 0; flex: 1;">
                <option value="">Ruolo</option>
                <option value="POR">Portiere</option>
                <option value="DIF">Difensore</option>
                <option value="CEN">Centrocampista</option>
                <option value="ATT">Attaccante</option>
            </select>
            
            <select id="market-rarity" class="glass-select" style="margin-top: 0; flex: 1;">
                <option value="">Qualità</option>
                <option value="Bronzo">Bronzo</option>
                <option value="Argento">Argento</option>
                <option value="Oro">Oro</option>
            </select>
        </div>
        
        <button id="market-search-btn" class="glass-btn" style="width: 100%; margin-top: 15px; background: var(--accent-dim); color: var(--accent); border-color: var(--accent);">
            <i class="fas fa-search"></i> Trova Giocatori
        </button>
    </div>

    <div class="divider"></div>
    <div class="section-label">Risultati Ricerca</div>

    <div id="market-results" style="display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; max-height: 400px; overflow-y: auto; padding-bottom: 20px;">
        <p style="color: var(--text-hint); text-align: center; width: 100%;">Imposta i filtri e premi Cerca.</p>
    </div>

</div>
